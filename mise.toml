[tools]
rust = "stable"

[tasks."wire:local"]
description = "Apply local wiring (path deps for cross-repo development)"
file = ".mise/tasks/wire/local"

[tasks."wire:remote"]
description = "Remove local wiring (restore remote/git references)"
file = ".mise/tasks/wire/remote"

[tasks."wire:status"]
description = "Show current wiring state (local vs remote)"
file = ".mise/tasks/wire/status"

[tasks."wire:update"]
description = "Regenerate wiring patches from current working tree"
file = ".mise/tasks/wire/update"

[tasks.start]
description = "Init chain + bootstrap nullifiers + start everything"
file = ".mise/tasks/start/all"

[tasks."start:chain"]
description = "Build + init + start single-validator chain"
file = ".mise/tasks/start/chain"

[tasks."start:ios"]
description = "Build xcframework for simulator + open Xcode"
file = ".mise/tasks/start/ios"

[tasks.stop]
description = "Stop all services"
file = ".mise/tasks/stop"

[tasks.status]
description = "Show status of all services"
file = ".mise/tasks/status"

[tasks."git:sync"]
description = "Clone missing repos or fetch existing ones"
file = ".mise/tasks/git/sync"

[tasks."git:status"]
description = "Show git status across all repos"
file = ".mise/tasks/git/status"

[tasks."git:branch"]
description = "Create a feature branch across repos"
file = ".mise/tasks/git/branch"

[tasks."git:push"]
description = "Push all repos that have unpushed commits"
file = ".mise/tasks/git/push"

[tasks."git:drift"]
description = "Fetch origins and show ahead/behind for each repo"
file = ".mise/tasks/git/drift"

[tasks.logs]
description = "Tail merged logs from svoted and nf-server"
file = ".mise/tasks/logs"
